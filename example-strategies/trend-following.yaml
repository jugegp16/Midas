softmax_temperature: 0.5
min_buy_delta: 0.02
min_cash_pct: 0.05

strategies:
  # -- Entry signals --
  - name: MovingAverageCrossover
    weight: 1.0
    params:
      short_window: 20
      long_window: 50

  - name: MACDCrossover
    weight: 1.0
    params:
      fast_period: 12
      slow_period: 26
      signal_period: 9

  # -- Exit rules --
  - name: MovingAverageCrossoverExit
    params:
      short_window: 20
      long_window: 50

  - name: MACDExit
    params:
      fast_period: 12
      slow_period: 26
      signal_period: 9

  - name: ProfitTaking
    params:
      gain_threshold: 0.20
