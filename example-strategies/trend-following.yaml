sigmoid_steepness: 2.0
rebalance_threshold: 0.02
min_cash_pct: 0.05

strategies:
  # -- CONVICTION --
  - name: MovingAverageCrossover
    weight: 1.0
    params:
      short_window: 20
      long_window: 50

  - name: MACDCrossover
    weight: 1.0
    params:
      fast_period: 12
      slow_period: 26
      signal_period: 9

  - name: RSIOverbought
    weight: 1.0
    params:
      window: 14
      overbought_threshold: 70.0

  - name: ProfitTaking
    weight: 1.0
    params:
      gain_threshold: 0.20
