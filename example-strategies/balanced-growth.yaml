softmax_temperature: 0.5
min_buy_delta: 0.02
min_cash_pct: 0.05

strategies:
  # -- Entry signals --
  - name: Momentum
    weight: 1.0
    params:
      window: 20

  - name: MeanReversion
    weight: 1.0
    params:
      window: 30
      threshold: 0.10

  # -- Exit rules --
  - name: ProfitTaking
    params:
      gain_threshold: 0.20

  - name: ChandelierStop
    params:
      window: 22
      multiplier: 3.0
