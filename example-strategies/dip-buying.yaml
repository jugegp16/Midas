sigmoid_steepness: 2.0
rebalance_threshold: 0.02
min_cash_pct: 0.05

strategies:
  # -- CONVICTION --
  - name: BollingerBand
    weight: 1.0
    params:
      window: 20
      num_std: 2.0

  - name: RSIOversold
    weight: 1.0
    params:
      window: 14
      oversold_threshold: 30.0

  # -- PROTECTIVE --
  - name: StopLoss
    veto_threshold: -0.5
    params:
      loss_threshold: 0.10
