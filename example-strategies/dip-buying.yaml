softmax_temperature: 0.5
min_buy_delta: 0.02
min_cash_pct: 0.05

strategies:
  # -- Entry signals --
  - name: BollingerBand
    weight: 1.0
    params:
      window: 20
      num_std: 2.0

  - name: RSIOversold
    weight: 1.0
    params:
      window: 14
      oversold_threshold: 30.0

  # -- Exit rules --
  - name: StopLoss
    params:
      loss_threshold: 0.10
